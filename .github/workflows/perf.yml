# =============================================================================
# perf.yml — HFT tail-latency and automotive deadline gates (bd-66l.1)
#
# Runs performance benchmarks on push to main only.
# Warn/block per threshold (not on PRs to avoid noise).
# =============================================================================

name: Perf Gates

on:
  push:
    branches: [main]

permissions:
  contents: read

env:
  CI: 1
  ASX_CI_RUN_TAG: "${{ github.run_id }}-${{ github.run_attempt }}"
  ASX_CI_ARTIFACT_ROOT: build/ci-manifests

jobs:
  # ---------------------------------------------------------------------------
  # perf-tail-deadline — HFT tail + automotive deadline gates
  # ---------------------------------------------------------------------------
  perf-tail-deadline:
    name: "perf: tail-latency + deadline gates"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq

      - name: Build (release)
        id: build_release
        run: make release

      - name: Run benchmarks
        id: run_bench
        run: make bench

      - name: Run benchmarks (JSON output)
        id: run_bench_json
        run: make bench-json > bench-results.json

      - name: Validate benchmark artifacts
        id: validate_manifest
        run: |
          if [ ! -s bench-results.json ]; then
            echo "[asx] perf: FAIL — bench-results.json missing or empty" >&2
            exit 1
          fi

      - name: Evaluate SLO gates
        id: slo_gate
        run: |
          mkdir -p build/perf
          tools/ci/evaluate_slo_gates.sh \
            --bench-json bench-results.json \
            --output build/perf/slo_gate_report.json \
            --run-id "${{ env.ASX_CI_RUN_TAG }}" \
            --strict

      - name: Build (HFT profile)
        id: build_hft
        run: make release PROFILE=HFT

      - name: Run benchmarks (HFT JSON)
        id: run_bench_hft
        run: make bench-json PROFILE=HFT > bench-results-hft.json

      - name: Evaluate HFT SLO gates
        id: slo_gate_hft
        run: |
          mkdir -p build/perf
          tools/ci/evaluate_slo_gates.sh \
            --bench-json bench-results-hft.json \
            --profile HFT \
            --output build/perf/slo_gate_hft_report.json \
            --run-id "${{ env.ASX_CI_RUN_TAG }}-hft" \
            --strict

      - name: Evaluate size and cold-start gates
        id: size_gate
        run: |
          mkdir -p build/perf
          tools/ci/evaluate_size_gates.sh \
            --lib build/lib/libasx.a \
            --bench-json bench-results.json \
            --output build/perf/size_gate_report.json \
            --run-id "${{ env.ASX_CI_RUN_TAG }}" \
            --strict

      - name: Run evidence dashboard
        id: evidence_dashboard
        if: always() && steps.run_bench_json.outcome == 'success'
        run: |
          tools/ci/run_evidence_dashboard.sh \
            --bench-json bench-results.json \
            --run-id "${{ env.ASX_CI_RUN_TAG }}"

      - name: Emit perf lane manifest
        if: always()
        run: |
          mkdir -p "${ASX_CI_ARTIFACT_ROOT}"
          lane="perf-tail-deadline"
          first_failure=""
          rerun=""

          if [ "${{ steps.build_release.outcome }}" = "failure" ]; then
            first_failure="release-build"
            rerun="make release"
          elif [ "${{ steps.run_bench.outcome }}" = "failure" ]; then
            first_failure="bench"
            rerun="make bench"
          elif [ "${{ steps.run_bench_json.outcome }}" = "failure" ]; then
            first_failure="bench-json"
            rerun="make bench-json > bench-results.json"
          elif [ "${{ steps.validate_manifest.outcome }}" = "failure" ]; then
            first_failure="validate-bench-artifacts"
            rerun="ls -l bench-results.json"
          elif [ "${{ steps.slo_gate.outcome }}" = "failure" ]; then
            first_failure="slo-gate-core"
            rerun="tools/ci/evaluate_slo_gates.sh --bench-json bench-results.json --strict"
          elif [ "${{ steps.slo_gate_hft.outcome }}" = "failure" ]; then
            first_failure="slo-gate-hft"
            rerun="tools/ci/evaluate_slo_gates.sh --bench-json bench-results-hft.json --profile HFT --strict"
          elif [ "${{ steps.size_gate.outcome }}" = "failure" ]; then
            first_failure="size-gate"
            rerun="tools/ci/evaluate_size_gates.sh --lib build/lib/libasx.a --bench-json bench-results.json --strict"
          fi

          status="pass"
          if [ -n "$first_failure" ]; then
            status="fail"
          fi

          jq -n \
            --arg lane "$lane" \
            --arg status "$status" \
            --arg run_tag "${{ env.ASX_CI_RUN_TAG }}" \
            --arg workflow "${{ github.workflow }}" \
            --arg sha "${{ github.sha }}" \
            --arg ref "${{ github.ref }}" \
            --arg build_outcome "${{ steps.build_release.outcome }}" \
            --arg bench_outcome "${{ steps.run_bench.outcome }}" \
            --arg bench_json_outcome "${{ steps.run_bench_json.outcome }}" \
            --arg validate_outcome "${{ steps.validate_manifest.outcome }}" \
            --arg slo_outcome "${{ steps.slo_gate.outcome }}" \
            --arg slo_hft_outcome "${{ steps.slo_gate_hft.outcome }}" \
            --arg size_outcome "${{ steps.size_gate.outcome }}" \
            --arg first_failure "$first_failure" \
            --arg rerun "$rerun" \
            '{
              lane: $lane,
              status: $status,
              run_tag: $run_tag,
              workflow: $workflow,
              sha: $sha,
              ref: $ref,
              steps: [
                {id: "release-build", outcome: $build_outcome, rerun: "make release"},
                {id: "bench", outcome: $bench_outcome, rerun: "make bench"},
                {id: "bench-json", outcome: $bench_json_outcome, rerun: "make bench-json > bench-results.json"},
                {id: "validate-bench-artifacts", outcome: $validate_outcome, rerun: "ls -l bench-results.json"},
                {id: "slo-gate-core", outcome: $slo_outcome, rerun: "tools/ci/evaluate_slo_gates.sh --bench-json bench-results.json --strict"},
                {id: "slo-gate-hft", outcome: $slo_hft_outcome, rerun: "tools/ci/evaluate_slo_gates.sh --bench-json bench-results-hft.json --profile HFT --strict"},
                {id: "size-gate", outcome: $size_outcome, rerun: "tools/ci/evaluate_size_gates.sh --lib build/lib/libasx.a --bench-json bench-results.json --strict"}
              ],
              first_failure: (if $first_failure == "" then null else {step: $first_failure, rerun: $rerun} end)
            }' > "${ASX_CI_ARTIFACT_ROOT}/${lane}.manifest.json"

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-tail-deadline-${{ env.ASX_CI_RUN_TAG }}
          path: |
            bench-results.json
            bench-results-hft.json
            build/bench/
            build/perf/
            tools/ci/artifacts/evidence/
            ${{ env.ASX_CI_ARTIFACT_ROOT }}/perf-tail-deadline.manifest.json
          retention-days: 30
